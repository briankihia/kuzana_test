name: Sync Obsidian Vault to Kuzana-Brain
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  sync-vault:
    runs-on: ubuntu-latest
    steps:
      - name: Check out notes repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run Sync Script
        run: |
          python backend/kuzana-sync.py \
            --vault "./" \
            --url "https://kuzana.onrender.com" \
            --token "kz_sync_dev_token"

